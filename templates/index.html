<!DOCTYPE html>
<html>
<head>
    <title>Grammar Error Correction</title>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2, #6e6565);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #e61717;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f4f4f4;
            border-radius: 5px;
            min-height: 50px;
        }

        .upload-box {
            margin-top: 30px;
            padding: 15px;
            border: 2px dashed #ccc;
            text-align: center;
            border-radius: 5px;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Grammar Error Correction</h1>

    <textarea id="text" placeholder="Enter text with grammar errors..."></textarea>
    <button onclick="correctText()">Correct Grammar</button>

    <div class="result">
        <h3>Corrected Text:</h3>
        <div id="result"></div>
    </div>

    <div class="upload-box">
        <h3>Upload Text File</h3>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file">
            <br><br>
            <button type="submit">Upload & Correct File</button>
        </form>
    </div>
</div>

<footer>
    <p>Grammar Correction System | developed by Partha Sarathi Sarkar</p>
</footer>

</body>
</html>
